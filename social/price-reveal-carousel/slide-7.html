<!DOCTYPE html>
<html><head><meta charset="UTF-8" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{gold:'#F5B942',primary:'#263056'}}}}</script>
<style>
  html,body{margin:0;padding:0;width:1080px;height:1350px;overflow:hidden;background:#263056;font-family:Inter,system-ui,sans-serif;}
  .dot{width:8px;height:8px;border-radius:50%;}
  @keyframes pulse2{0%,100%{box-shadow:0 0 0 0 rgba(245,185,66,.4)}50%{box-shadow:0 0 0 18px rgba(245,185,66,0)}}
</style>
</head>
<body class="relative text-white">
  <div class="absolute inset-0 bg-gradient-to-br from-[#263056] via-[#1d2545] to-[#0d1424]"></div>
  <div class="relative z-10 h-full flex flex-col items-center justify-center px-20 text-center">
    <p class="text-white/60 text-2xl mb-4">Everything above, every month.</p>
    <p class="text-gold font-black text-7xl leading-none mb-2">39,900</p>
    <p class="text-white font-black text-3xl uppercase tracking-widest mb-14">THB / Month</p>
    <div class="inline-flex items-center gap-3 bg-gold text-primary font-black uppercase text-2xl tracking-widest px-12 py-6 rounded-2xl" style="animation:pulse2 2.4s ease-in-out infinite;">
      Apply Today
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
    </div>
    <p class="text-white/40 text-xl mt-10 uppercase tracking-widest">Link In Bio</p>
  </div>
  <div class="absolute bottom-14 left-1/2 -translate-x-1/2 flex gap-2">
    <div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-gold"></div>
  </div>
</body></html>
