<!DOCTYPE html>
<html><head><meta charset="UTF-8" />
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{gold:'#F5B942',primary:'#263056'}}}}</script>
<style>html,body{margin:0;padding:0;width:1080px;height:1350px;overflow:hidden;background:#263056;font-family:Inter,system-ui,sans-serif;}.dot{width:8px;height:8px;border-radius:50%;}</style>
</head>
<body class="relative text-white">

      <svg class="w-14 h-14 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="9" stroke="currentColor" fill="none"/><circle cx="12" cy="12" r="5" stroke="currentColor" fill="none"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>

  </div>
  <div class="absolute bottom-14 left-1/2 -translate-x-1/2 flex gap-2">
    <div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-white/25"></div><div class="dot bg-gold"></div><div class="dot bg-white/25"></div>
